version: "3.8"
x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  depends_on:
    - db
  env_file:
    - .env
  runtime: nvidia
  environment:
    PYTHONUNBUFFERED: 1
    CUDA_VISIBLE_DEVICES: "${CUDA_VISIBLE_DEVICES}"
    POSTGRES_HOST: db
    POSTGRES_PORT: 5432
    POSTGRES_DB: "${POSTGRES_DB}"
    POSTGRES_USER: "${POSTGRES_USER}"
    POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    PGPASSWORD: "${POSTGRES_PASSWORD}"
    WANDB_PROJECT: "${WANDB_PROJECT}"
    WANDB_ENTITY: "${WANDB_ENTITY}"
    SCENARIO: "${SCENARIO}"
    TAG: "${TAG}"
    USE_WANDB: "${USE_WANDB}"
    HF_HOME: "/root/.cache/huggingface"
    TRANSFORMERS_CACHE: "/root/.cache/huggingface"
    VLLM_CACHE_DIR: "/root/.cache/huggingface"
  volumes:
    - /home/lukas/burr/Burr/result:/results
    - hf_model_cache:/root/.cache/huggingface

services:
  burr:
    <<: *app-common
    command: >
      bash -c 'python3 /experiment/evaluator/experimenter/experiment_script.py
      --scenario "$SCENARIO" --tag "$TAG" $([ "$USE_WANDB" = "true" ] && echo "--wandb")'

  db:
    image: postgis/postgis:14-3.3 
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    ports:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  hf_model_cache: